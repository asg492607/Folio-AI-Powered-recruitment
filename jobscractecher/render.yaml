databases:
  - name: opportunity-db
    databaseName: opportunity_db
    user: opportunity_user

services:
  - type: web
    name: opportunity-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt && playwright install chromium"
    startCommand: "cd backend && gunicorn app.main:app -k uvicorn.workers.UvicornWorker -c gunicorn.conf.py"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: opportunity-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://opportunity-frontend.onrender.com
      - key: ENABLE_BACKGROUND_SCRAPING
        value: true
      - key: SCRAPE_INTERVAL_MINUTES
        value: 360
      - key: ENABLE_BROWSER_SCRAPING
        value: true

  - type: web
    name: opportunity-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    envVars:
      - key: VITE_API_URL
        value: https://opportunity-backend.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
