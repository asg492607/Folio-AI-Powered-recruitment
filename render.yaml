services:
  # The All-in-One Unified Monolithic Server
  - type: web
    name: folio-all-in-one
    env: python
    rootDir: .
    buildCommand: bash ./build.sh
    startCommand: cd unified_backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: VITE_API_URL
        value: ""
      # Firebase fallback mocks for Recruiter App deployment
      - key: VITE_FIREBASE_API_KEY
        value: mock-key
      - key: VITE_FIREBASE_AUTH_DOMAIN
        value: mock-domain
      - key: VITE_FIREBASE_PROJECT_ID
        value: mock-project
      - key: VITE_FIREBASE_STORAGE_BUCKET
        value: mock-bucket
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        value: mock-sender
      - key: VITE_FIREBASE_APP_ID
        value: mock-app
